name: PowerNukkitX Build

on:
  pull_request:
    branches:
      - r/**

jobs:
  filter:
    name: Filter relevant changes
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - name: Detect modified files
        id: filter
        uses: dorny/paths-filter@668c092af3649c4b664c54e4b704aa46782f6f7c
        with:
          filters: |
            src:
              - 'src/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - '.github/workflows/build.yml'

  build:
    name: Build PNX Server
    runs-on: ubuntu-latest
    needs: filter
    timeout-minutes: 15
    steps:
      - name: Check if relevant changes
        id: check
        run: |
          echo "src=${{ needs.filter.outputs.src }}" >> $GITHUB_OUTPUT
      - name: No relevant changes detected
        if: needs.filter.outputs.src != 'true'
        run: echo 'No relevant changes for build or check. Skipping build.'
      - name: Checkout repository (shallow)
        if: needs.filter.outputs.src == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false
      - name: Set up JDK 21 (Temurin)
        if: needs.filter.outputs.src == 'true'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Restore Gradle cache
        if: needs.filter.outputs.src == 'true'
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-
      - name: Make gradlew executable
        if: needs.filter.outputs.src == 'true'
        run: chmod +x gradlew
      - name: Build project (parallel, optimized)
        if: needs.filter.outputs.src == 'true'
        run: ./gradlew assemble --no-daemon --parallel --max-workers=2 --no-configuration-cache --stacktrace
      - name: Upload JAR artifact (on success)
        if: needs.filter.outputs.src == 'true' && success()
        uses: actions/upload-artifact@v6
        with:
          name: powernukkitx-jar
          path: build/libs/*.jar
      - name: Ensure test-results directory exists
        if: needs.filter.outputs.src == 'true'
        run: mkdir -p build/test-results
      - name: Upload test results (always)
        if: needs.filter.outputs.src == 'true' && always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: build/test-results/

  check:
    name: Static checks (format, lint)
    runs-on: ubuntu-latest
    needs: filter
    if: needs.filter.outputs.src == 'true'
    steps:
      - name: Checkout repository (shallow)
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Restore Gradle cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Gradle check (format, lint, etc)
        run: ./gradlew check -PskipTests --no-daemon --parallel --max-workers=2 --no-configuration-cache --stacktrace

  summary:
    name: Build summary
    runs-on: ubuntu-latest
    needs: [build, check]
    if: always()
    steps:
      - name: Show build summary
        run: |
          echo 'Build & static checks completed. See artifacts and logs above.'

