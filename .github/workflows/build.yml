name: PowerNukkitX Build

on:
  pull_request:
    branches:
      - master
      - r/**
      - b/**
    paths:
      - 'src/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - '.github/**'

jobs:
  build:
    name: Build PNX Server
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - run: chmod +x gradlew

      - run: ./gradlew assemble --no-daemon --parallel --max-workers=2 --stacktrace

      - uses: actions/upload-artifact@v7
        if: success()
        with:
          name: powernukkitx-jar
          path: build/libs/*.jar

  check:
    name: Static checks (format, lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - run: chmod +x gradlew

      - run: ./gradlew check -PskipTests --no-configuration-cache --no-daemon --parallel --max-workers=2 --stacktrace
