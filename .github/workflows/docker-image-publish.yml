name: Update Docker Hub images

on:
  push:
    branches:
      - master
      - feat/docker
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release:
        description: 'Tag name to build'
        required: true

jobs:
  build:
    name: Update Docker Hub images
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get tag name
        id: tag-name
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo TAG_NAME="nightly" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            echo TAG_NAME="${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo TAG_NAME="${{ github.event.inputs.release }}" >> $GITHUB_OUTPUT
          else
            echo "Unsupported event type: ${{ github.event_name }}"
            exit 1
          fi

      - name: Parse version
        id: version
        run: |
          VERSION="${{ steps.tag-name.outputs.TAG_NAME }}"
          echo MAJOR=$(echo $VERSION | cut -d. -f1) >> $GITHUB_OUTPUT
          echo MINOR=$(echo $VERSION | cut -d. -f1-2) >> $GITHUB_OUTPUT

      - name: Detect channel
        id: channel
        run: |
          # Semver tag means a stable release, "nightly" and anything else stays unstable.
          if [[ "${{ steps.tag-name.outputs.TAG_NAME }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo CHANNEL=stable >> $GITHUB_OUTPUT
          else
            echo CHANNEL=unstable >> $GITHUB_OUTPUT
          fi

      - name: Build image for tag
        uses: docker/build-push-action@v7.1.0
        with:
          push: true
          file: ./Dockerfile
          tags: |
            powernukkitx/server:${{ steps.tag-name.outputs.TAG_NAME }}
            ghcr.io/powernukkitx/server:${{ steps.tag-name.outputs.TAG_NAME }}

      - name: Build image for major tag
        if: steps.channel.outputs.CHANNEL == 'stable'
        uses: docker/build-push-action@v7.1.0
        with:
          push: true
          file: ./Dockerfile
          tags: |
            powernukkitx/server:${{ steps.version.outputs.MAJOR }}
            ghcr.io/powernukkitx/server:${{ steps.version.outputs.MAJOR }}

      - name: Build image for minor tag
        if: steps.channel.outputs.CHANNEL == 'stable'
        uses: docker/build-push-action@v7.1.0
        with:
          push: true
          file: ./Dockerfile
          tags: |
            powernukkitx/server:${{ steps.version.outputs.MINOR }}
            ghcr.io/powernukkitx/server:${{ steps.version.outputs.MINOR }}

      - name: Build image for latest tag
        if: steps.channel.outputs.CHANNEL == 'stable'
        uses: docker/build-push-action@v7.1.0
        with:
          push: true
          file: ./Dockerfile
          tags: |
            powernukkitx/server:latest
            ghcr.io/powernukkitx/server:latest
