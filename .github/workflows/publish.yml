name: PowerNukkitX Publish

on:
  push:
    branches:
      - r/**
  workflow_dispatch:

jobs:
  build-publish-maven:
    name: Build & Publish to Maven + Codecov
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      title: ${{ steps.meta.outputs.title }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - name: Check Branch
        run: |
          if [[ "${{ github.ref_name }}" != r/* ]]; then
            echo "This workflow only runs on r/** branches. Got: ${{ github.ref_name }}"
            exit 1
          fi

      - name: Checkout Repository (Full)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: Compute Release Metadata
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME#r/}"
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          CURRENT_BRANCH="${{ github.ref_name }}"

          if [ "$CURRENT_BRANCH" = "$DEFAULT_BRANCH" ]; then
            TITLE="Latest Snapshot ($TAG)"
            PRERELEASE=false
          else
            TITLE="PowerNukkitX $TAG"
            PRERELEASE=true
          fi

          echo "tag=$TAG"               >> $GITHUB_OUTPUT
          echo "title=$TITLE"           >> $GITHUB_OUTPUT
          echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT

      - name: Set Up JDK 21 (Temurin)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Restore Gradle Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Make Gradle Wrapper Executable
        run: chmod +x gradlew

      - name: Build & Publish to Maven Repository
        run: ./gradlew publish --no-configuration-cache -PbuildVersion=${{ steps.meta.outputs.tag }}-SNAPSHOT
        env:
          PNX_REPO_USERNAME: ${{ secrets.PNX_REPO_USERNAME }}
          PNX_REPO_PASSWORD: ${{ secrets.PNX_REPO_PASSWORD }}

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v6
        with:
          name: powernukkitx.jar
          path: build/powernukkitx.jar

      - name: Upload Test Results to Codecov
        if: success() && github.repository == 'PowerNukkitX/PowerNukkitX'
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1.2.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build-publish-maven
    steps:
      - name: Download JAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: powernukkitx.jar
          path: build

      - name: Push Tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/git/refs \
            -d '{"ref":"refs/tags/${{ needs.build-publish-maven.outputs.tag }}","sha":"${{ github.sha }}"}'

      - name: Publish Release
        uses: softprops/action-gh-release@e798e6a1ede8d07b74ac4cdac6bdfa4cc1653907
        with:
          tag_name: ${{ needs.build-publish-maven.outputs.tag }}
          name: ${{ needs.build-publish-maven.outputs.title }}
          prerelease: ${{ needs.build-publish-maven.outputs.prerelease }}
          files: build/powernukkitx.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}